services:
  postgres:
    image: ${POSTGRES_IMAGE}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ${POSTGRES_DATA_DIR}:/var/lib/postgresql/data
  qdrant:
    image: ${QDRANT_IMAGE}
    ports:
      - "${QDRANT_PORT}:6333"
    volumes:
      - ${QDRANT_STORAGE_DIR}:/qdrant/storage
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: ${DOCKER_POSTGRES_HOST}
      POSTGRES_PORT: ${DOCKER_POSTGRES_PORT}
      QDRANT_HOST: ${DOCKER_QDRANT_HOST}
      STORAGE_ROOT_DIR: ${DOCKER_STORAGE_ROOT_DIR}
    ports:
      - "${PORT}:8080"
    depends_on:
      - postgres
      - qdrant
    volumes:
      - ${UPLOADS_DATA_DIR}:/app/data/uploads
  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: ${DOCKER_POSTGRES_HOST}
      POSTGRES_PORT: ${DOCKER_POSTGRES_PORT}
      QDRANT_HOST: ${DOCKER_QDRANT_HOST}
      STORAGE_ROOT_DIR: ${DOCKER_STORAGE_ROOT_DIR}
    depends_on:
      - postgres
      - qdrant
    volumes:
      - ${UPLOADS_DATA_DIR}:/app/data/uploads
