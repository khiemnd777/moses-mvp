services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: legal
      POSTGRES_PASSWORD: legal
      POSTGRES_DB: legal_rag
    ports:
      - "5433:5432"
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
  qdrant:
    image: qdrant/qdrant:v1.9.3
    ports:
      - "6333:6333"
    volumes:
      - ../data/qdrant:/qdrant/storage
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    environment:
      CONFIG_PATH: /app/config/config.yaml
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-jwt-secret-change-me}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-dev-admin-password-change-me}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - qdrant
    volumes:
      - ../data/uploads:/app/data/uploads
  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    environment:
      CONFIG_PATH: /app/config/config.yaml
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-jwt-secret-change-me}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-dev-admin-password-change-me}
    depends_on:
      - postgres
      - qdrant
    volumes:
      - ../data/uploads:/app/data/uploads
